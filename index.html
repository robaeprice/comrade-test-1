const formatNumber = n => n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
const getCurrencySymbol = c => ({USD:'$',EUR:'€',GBP:'£'})[c]||'$';
const formatSmartNumber = n => { if (n !== 0 && Math.abs(n) < 0.01) return n.toExponential(4); return formatNumber(n.toFixed(2)); };
const formatCurrency = (v, d=2, c='USD') => `${getCurrencySymbol(c)}${formatNumber((parseFloat(v)||0).toFixed(d))}`;
const formatCurrencySmart = (v, c='USD') => `${getCurrencySymbol(c)}${formatSmartNumber(v)}`;
const getWeightingLabel = w => ({none:'OFF',gentle:'LOW',standard:'MID',strong:'HIGH'})[w]||'MID';
const getWealthMetricLabel = m => m === 'networth' ? 'NET WORTH' : 'SALARY';
const getMeasurementLabel = m => m === 'sqm' ? 'SQ M' : 'SQ FT';
const sortByW = a => [...a].sort((x,y)=>y.wealth-x.wealth);
const applyCap = (items, capVal, total, count, shareKey, weightKey) => {
  if(capVal==='off') return;
  const max=parseFloat(capVal)*(total/count);
  let changed=true;
  while(changed){
    changed=false;
    const above=items.filter(p=>p[shareKey]>max+0.001);
    if(!above.length) break;
    changed=true;
    const surplus=above.reduce((s,p)=>s+(p[shareKey]-max),0);
    above.forEach(p=>{p[shareKey]=max;});
    const below=items.filter(p=>p[shareKey]<max-0.001);
    const tw=below.reduce((s,p)=>s+p[weightKey],0);
    below.forEach(p=>{p[shareKey]+=tw>0?(p[weightKey]/tw)*surplus:surplus/below.length;});
  }
};

const applyWeighting = (wealth, weighting) => {
  if (weighting === 'none') return 1;
  if (weighting === 'gentle') return Math.sqrt(wealth);
  if (weighting === 'strong') return wealth * wealth;
  return wealth;
};

const BgSymbols = () => {
  const w=160,h=172,fs=48,op=0.09;
  const xs=[Math.round(w/6),Math.round(w/2),Math.round(5*w/6)];
  const ys=[45,102,159];

  return (

};

const readStorage = (key) => {
  try {
    const d = JSON.parse(localStorage.getItem(key)||'null');
    if (!d) return null;
    if (d.lastUpdated && Date.now() - d.lastUpdated > THIRTY_DAYS) { localStorage.removeItem(key); return null; }
    return d;
  } catch { return null; }
};

const saveToStorage = (key, data) => {
  try { localStorage.setItem(key, JSON.stringify({...data, lastUpdated:Date.now()})); } catch {}
};

const renderWealthPieChart = data => {
  const sorted=sortByW(data);
  const total=sorted.reduce((s,p)=>s+p.wealth,0);
  const colors=['#333333','#555555','#777777','#999999','#AAAAAA','#BBBBBB','#CCCCCC','#DDDDDD'];
  return(
    <>
      <svg aria-hidden="true" viewBox="0 0 200 200" className="w-full max-w-xs mx-auto">
        {(()=>{let cur=0;return sorted.map((p,idx)=>{
          const pct=total>0?(p.wealth/total):(1/sorted.length),angle=pct*360,cx=100,cy=100,r=70,ir=30;
          const s1=((cur-90)*Math.PI/180),e1=((cur+angle-90)*Math.PI/180);
          const x1=cx+r*Math.cos(s1),y1=cy+r*Math.sin(s1),x2=cx+r*Math.cos(e1),y2=cy+r*Math.sin(e1);
          const x3=cx+ir*Math.cos(e1),y3=cy+ir*Math.sin(e1),x4=cx+ir*Math.cos(s1),y4=cy+ir*Math.sin(s1);
          const la=angle>180?1:0;
          const d=`M${x1} ${y1} A${r} ${r} 0 ${la} 1 ${x2} ${y2} L${x3} ${y3} A${ir} ${ir} 0 ${la} 0 ${x4} ${y4} Z`;
          cur+=angle;
          return <path key={idx} d={d} fill={colors[idx%colors.length]} stroke={BG_GREY} strokeWidth="1"/>;
        });})()}
      </svg>
      <div className="mt-6 space-y-2">
        {sorted.map((p,idx)=>{
          const pct=total>0?(p.wealth/total)*100:100/sorted.length;
          return(
            <div key={idx} className="flex flex-wrap items-center gap-x-3 gap-y-1 text-xs text-black">
              <div className="w-4 h-4 border border-gray-400 flex-shrink-0" style={{backgroundColor:colors[idx%colors.length]}}></div>
              <span className="font-bold text-black">{p.name}</span>
              <span className="text-black">${formatNumber(p.wealth.toFixed(2))}</span>
              <span className="font-bold text-black">({pct.toFixed(1)}%)</span>
            </div>
          );
        })}
      </div>
    </>
  );
};

    {q:'WHAT DO YOU DO WITH MY FINANCIAL INFORMATION?',render:<><p className={CLS_PARA3}>Your financial information is never sold, never used for advertising, and never associated with your identity.</p><p className={CLS_PARA3}>In Private Splits, these calculations are performed by your device, and your data is only stored locally. It is never sent to Comrade, and is automatically wiped after 30 days of inactivity.</p><p className={CLS_PARA3}>In Group Splits, your data is securely synced to Comrade's servers, and is accessible only to your friends who you share the group link with. Comrade may use anonymized, aggregated data from Group Splits to study trends in how people share expenses. Individual splits are never singled out or made identifiable. Group Splits can be deleted at any time.</p><p className={CLS_PARA}>If a user signs up for email updates, their email is shared with Comrade only, and is not associated with any financial data.</p></>},
    {q:'WHAT IS "WEIGHTING"?',a:`Weighting is the level of emphasis placed on each user's relative wealth (salary/net worth). By default, each person's responsibility is directly proportional to their wealth.\n\nFor example, let's say Fred and George each paid $100 on shared bills. Fred earns $50,000 a year, while George brings in $100,000. With regular ("Mid") weighting, because George makes twice as much money as Fred, he should pay twice as much. So far, he only paid 50% — $100 — meaning he owes Fred another $33.33.\n\nIn settings, you can also select "High" weighting, which emphasizes wealth differences even more by using squared wealth values for calculations; or "Low" weighting, which uses square-root values for more gentle adjustments. There is also an option to forego weighting entirely.`},
    {q:'WHAT IS A "CONTRIBUTION CAP"?',a:`A contribution cap sets a maximum amount that any group member must pay, regardless of their wealth. It's expressed as a multiple of what they'd owe in an even split.\n\nFor example, if three people are splitting $300 and the cap is set to 2x, no one pays more than $200 — that's twice the equal $100 share.\n\nBy default, the contribution cap is deactivated.`},
    {q:'HOW DO GROUP SPLITS WORK?',render:<><p className={CLS_PARA3}>When you start a Group Split, Comrade generates a shareable link you can send to your group. Anyone with the link can view the split, add or remove people and expenses, and calculate results — with no account required.</p><p className={CLS_PARA3}>Group Splits are stored securely and can be deleted at any time.</p><p className={CLS_PARA}>Anyone with the link to a Group Split can access all the data in it.</p></>},

    const hasPartialBills=billBills.some(b=>b.participants?.length>0);
    let shares=billPeople.map(p=>{
      const w=parseFloat(p.wealth)||0,paid=billBills.filter(b=>b.paidBy===p.name).reduce((s,b)=>s+(parseFloat(b.amount)||0),0),aw=applyWeighting(w,billWeighting);
      return{...p,wealth:w,paid,fairShare:0,adjustedWealth:aw};
    });
    const billDetails=[];
    for(const bill of billBills){
      const amt=parseFloat(bill.amount)||0;
      if(amt===0) continue;
      const partNames=bill.participants?.length>0?bill.participants:shares.map(p=>p.name);
      const parts=shares.filter(p=>partNames.includes(p.name));
      const taw=parts.reduce((s,p)=>s+p.adjustedWealth,0);
      const detail={desc:bill.description,amount:amt,isPartial:bill.participants?.length>0,shares:[]};
      for(const part of parts){
        const idx=shares.findIndex(p=>p.name===part.name);
        const share=taw>0?(part.adjustedWealth/taw)*amt:amt/parts.length;
        if(idx>=0) shares[idx].fairShare+=share;
        detail.shares.push({name:part.name,aw:part.adjustedWealth,taw,share});
      }
      billDetails.push(detail);
    }
    const preCapShares=shares.map(p=>({name:p.name,fairShare:p.fairShare}));
    applyCap(shares, billFloor, total, billPeople.length, 'fairShare', 'adjustedWealth');
    const capWasApplied=billFloor!=='off'&&shares.some((p,i)=>Math.abs(p.fairShare-preCapShares[i].fairShare)>0.01);
    const peopleData=shares.map((p,i)=>({...p,preCapShare:preCapShares[i].fairShare,paidPct:total>0?(p.paid/total)*100:0,fairPct:total>0?(p.fairShare/total)*100:0}));
    const settlements=peopleData.map(p=>({name:p.name,balance:p.paid-p.fairShare})).filter(s=>Math.abs(s.balance)>0.01);
    const payers=settlements.filter(s=>s.balance<0).sort((a,b)=>a.balance-b.balance);
    const receivers=settlements.filter(s=>s.balance>0).sort((a,b)=>b.balance-a.balance);
    const transactions=[];let pi=0,ri=0;
    const pc=payers.map(p=>({...p})),rc=receivers.map(r=>({...r}));
    while(pi<pc.length&&ri<rc.length){
      const amt=Math.min(-pc[pi].balance,rc[ri].balance);
      transactions.push({from:pc[pi].name,to:rc[ri].name,amount:amt});
      pc[pi].balance+=amt;rc[ri].balance-=amt;
      if(Math.abs(pc[pi].balance)<0.01)pi++;if(Math.abs(rc[ri].balance)<0.01)ri++;
    }
    return{total,peopleData,transactions,hasPartialBills,billDetails,capWasApplied};

          <button onClick={()=>{if(curPersonName.trim()){setBillPeople([...billPeople,{id:Date.now(),name:curPersonName,wealth:curPersonWealth}]);setCurPersonName('');setCurPersonWealth('');}}} className={`${CLS_BTN_BLK} mb-4`}>+ ADD PERSON</button>
          {billPeople.length>0
            ?<ItemList items={billPeople} onDelete={id=>setBillPeople(billPeople.filter(p=>p.id!==id))} renderItem={p=><><p className={CLS_NAME}>{p.name}</p><p className={CLS_XS}>{getWealthMetricLabel(billWealthMetric)}: {_fc(p.wealth,billCurrency)}</p></>}/>
            :<EmptyState msg="No people added yet"/>
          }
          {contBtn(2)}
        </div>
      ),
      ()=>(
        <div>
          <p className={CLS_STEP_P}>Add all the expenses the group is splitting, along with who already paid for what.</p>
          <FormInput value={curBillDesc} onChange={e=>setCurBillDesc(e.target.value)} placeholder="DESCRIPTION" className="mb-2"/>
          <div className={CLS_ROW3}>
            <FormInput type="number" value={curBillAmt} onChange={e=>setCurBillAmt(e.target.value)} placeholder={`${getCurrencySymbol(billCurrency)} AMOUNT`} {...NP} className="flex-1" style={{minWidth:'150px'}}/>
            <select value={curBillPaidBy} onChange={e=>setCurBillPaidBy(e.target.value)} aria-label="Who paid" className={CLS_I1} style={{minWidth:'150px',fontSize:'16px'}}>
              <option value="">WHO PAID?</option>
              {billPeople.map((p,j)=><option key={p.id||j} value={p.name}>{p.name}</option>)}
            </select>
          </div>
          <div className="mb-3">
              {!participantSelectorOpen?(
                <button onClick={()=>{if(billPeople.length>0)setPendingParticipants(curBillParticipants.length>0?[...curBillParticipants]:billPeople.map(p=>p.name));setParticipantSelectorOpen(true);}} className="w-full flex justify-between items-center p-2 border border-dashed border-gray-400 bg-white" style={{textAlign:'left'}}>
                  <span className="text-xs font-bold uppercase tracking-wider"><span style={{color:DARK}}>PARTICIPANTS: </span><span style={{color:'#9CA3AF'}}>{billPeople.length===0?'N/A':curBillParticipants.length===0?'ALL':curBillParticipants.length<=3?curBillParticipants.join(', '):curBillParticipants.slice(0,3).join(', ')+' +'+String(curBillParticipants.length-3)}</span></span>
                  <span className="text-black font-bold" style={{lineHeight:1,fontSize:'14px'}}>&#9662;</span>
                </button>
              ):billPeople.length===0?(
                <div className="border-2 border-dashed border-gray-400 bg-gray-50 p-3 animate-fadeIn">
                  <p className="text-xs font-bold text-black uppercase tracking-wider mb-2">PARTICIPANTS</p>
                  <p className="text-xs text-black mb-3 leading-relaxed">Go back to the previous step and add some people first.</p>
                  <button onClick={()=>setParticipantSelectorOpen(false)} className={CLS_BTN_WHT + ' w-full'}>CLOSE</button>
                </div>
              ):(
                <div className="border-2 border-dashed border-gray-400 bg-gray-50 p-3 animate-fadeIn">
                  <p className="text-xs font-bold text-black uppercase tracking-wider mb-3">SELECT PARTICIPANTS:</p>
                  <div className="space-y-0 mb-3">
                    {billPeople.map(p=>{
                      const checked=pendingParticipants.includes(p.name);
                      const toggle=()=>setPendingParticipants(prev=>prev.includes(p.name)?prev.filter(n=>n!==p.name):[...prev,p.name]);
                      return(
                      <div key={p.id} role="checkbox" aria-checked={checked} tabIndex={0} onClick={toggle} onKeyDown={e=>(e.key==='Enter'||e.key===' ')&&(e.preventDefault(),toggle())} className="flex items-center gap-3 cursor-pointer py-2 hover:opacity-70">
                        <div aria-hidden="true" style={{width:16,height:16,border:'2px solid '+DARK,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:checked?DARK:'white'}}>
                          {checked&&<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5.5 4,8 8.5,2" fill="none" stroke={BG_GREY} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                        </div>
                        <span className="text-xs font-bold text-black uppercase">{p.name}</span>
                      </div>
                      );
                    })}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={()=>{setCurBillParticipants(pendingParticipants.length===billPeople.length?[]:[...pendingParticipants]);setParticipantSelectorOpen(false);}} disabled={pendingParticipants.length===0} className={'flex-1 px-4 py-2 font-bold border-2 border-black text-xs transition-all '+(pendingParticipants.length===0?'bg-gray-300 text-gray-500 cursor-not-allowed':'bg-black text-white hover:bg-gray-800')}>CONFIRM</button>
                    <button onClick={()=>setParticipantSelectorOpen(false)} className={'flex-1 '+CLS_BTN_WHT}>CANCEL</button>
                  </div>
                </div>
              )}
            </div>
          <button onClick={()=>{if(curBillDesc.trim()){setBillBills([...billBills,{id:Date.now(),description:curBillDesc,amount:curBillAmt,paidBy:curBillPaidBy,participants:curBillParticipants}]);setCurBillDesc('');setCurBillAmt('');setCurBillPaidBy('');setCurBillParticipants([]);setParticipantSelectorOpen(false);setPendingParticipants([]);}}} className={`${CLS_BTN_BLK} mb-4`}>+ ADD BILL</button>
          {billBills.length>0
            ?<ItemList items={billBills} onDelete={id=>setBillBills(billBills.filter(b=>b.id!==id))} renderItem={b=>{const pL=b.participants?.length>0?b.participants.join(', '):null;return <><p className="text-black font-bold uppercase">{b.description}</p><p className="text-black text-xs">{b.paidBy||'Unknown'}{pL&&(' ('+pL+')')}</p></>;}} receiptStyle formatTotal={t=>_fc(t,billCurrency)} getAmount={b=>b.amount}/>
            :<EmptyState msg="No bills added yet" cls="mb-4"/>
          }
          {contBtn(3)}
        </div>
      ),
    ]
  });

  if(page==='bill-results'){
    const {total,peopleData,transactions,hasPartialBills,billDetails,capWasApplied}=billCalculations;
    const copyText=_ct(`${groupName?groupName+' b':'B'}ill-splitting results`,[`Total: ${_fc(total,billCurrency)}`,`💸 Who pays who:\n${transactions.length===0?'All settled!':transactions.map(t=>`${t.from} pays ${t.to} ${_fcs(t.amount,billCurrency)}`).join('\n')}`,`📊 Breakdown:\n${peopleData.map(p=>`${p.name}: Paid ${_fc(p.paid,billCurrency)} → fair share ${_fcs(p.fairShare,billCurrency)}`).join('\n')}`],'the fairer way to split bills with friends');
    return ResultsPage({
      entryPage:"bill-entry", title:groupName?`${groupName.toUpperCase()} SETTLEMENT`:"YOUR SETTLEMENT",
      boxExtra:<BoxBranding tagline="THE FAIRER WAY TO SPLIT BILLS WITH FRIENDS"/>,
      summary:transactions.length===0
        ?<p className="text-lg font-bold">ALL SETTLED! EVERYONE'S SQUARE.</p>
        :<div className="space-y-3">{transactions.map((t,i)=><div key={i} className="text-sm leading-relaxed pb-2" style={{borderBottom:`1px dashed ${BG_GREY}`}}><span className="font-semibold">{t.from.toUpperCase()}</span><span> PAYS </span><span className="font-semibold">{t.to.toUpperCase()}</span><br/><span className="font-black text-2xl">{_fcs(t.amount,billCurrency)}</span></div>)}</div>,
      stats:[{label:'TOTAL BILLS',value:billBills.length},{label:'TOTAL',value:_fc(total,billCurrency)},{label:'PEOPLE',value:billPeople.length}],
      copyText,
      details:<>
        <div className="mb-6"><h3 className={CLS_H3}>WEALTH VISUALIZATION</h3>{renderWealthPieChart(peopleData)}</div>
        <DashedDivider/>
        {(()=>{const evenShare=total/peopleData.length;const evenPct=100/peopleData.length;return renderBarVisualization('PAYMENT VISUALIZATION',sortByW(peopleData),[{label:'EVEN',color:'#AAAAAA',getValue:()=>evenShare,displayValue:()=>`${evenPct.toFixed(0)}%`,rightLabel:()=>_fc(evenShare,billCurrency)},{label:'PAID',color:'#777777',getValue:p=>p.paid,displayValue:p=>`${p.paidPct.toFixed(0)}%`,rightLabel:p=>_fc(p.paid,billCurrency)},{label:'FAIR',color:DARK,getValue:p=>p.fairShare,displayValue:p=>`${p.fairPct.toFixed(0)}%`,rightLabel:p=>_fcs(p.fairShare,billCurrency)}],p=>p.name);})()}
        <DashedDivider/>
        {renderDetailCards('PARTICIPANT DATA',sortByW(peopleData),p=>{const bal=p.paid-p.fairShare;return{name:p.name,rows:[{label:'WEALTH',value:_fc(p.wealth,billCurrency)},{label:'PAID',value:`${_fc(p.paid,billCurrency)} (${p.paidPct.toFixed(1)}%)`},{label:'FAIR SHARE',value:`${_fcs(p.fairShare,billCurrency)} (${p.fairPct.toFixed(1)}%)`}],summaryRows:[{label:'BALANCE',value:`${bal>0.01?'+':''}${_fcs(bal,billCurrency)}`}]};})}
        <DashedDivider/>
        <div className="mb-6">
          <h3 className={CLS_H3}>BILL RECAP</h3>
          <div className="space-y-3 mb-4">{billBills.map((b,i)=>{const pL=b.participants?.length>0?b.participants.join(', '):null;return <div key={b.id||i} className="flex justify-between items-start text-xs text-black border-b border-dashed border-gray-400 pb-2"><div className="flex-1"><p className="font-bold text-black uppercase">{b.description}</p><p className="text-black text-xs">{b.paidBy||'Unknown'}{pL&&(' ('+pL+')')}</p></div><span className="font-bold text-black ml-4">{_fc(b.amount,billCurrency)}</span></div>;})}</div>
          <div className={CLS_TOTAL}><span className={CLS_FBS}>TOTAL</span><span className={CLS_FBT}>{_fc(total,billCurrency)}</span></div>
        </div>
        <DashedDivider/>
        {(()=>{
          const capMax=billFloor!=='off'?parseFloat(billFloor)*(total/peopleData.length):0;
          if(!hasPartialBills){
            const steps=[
              <div key="s1">{renderAdjustedWealthStep(1,peopleData,billWeighting)}<div className={`flex justify-between mt-2 pt-2 ${CLS_DASHED_T} font-bold`}><span>TOTAL:</span><span className="font-mono">{_fsn(peopleData.reduce((s,p)=>s+p.adjustedWealth,0))}</span></div></div>,
              <div key="s2"><p className={CLS_FB}>2. FAIR SHARE %:</p>{renderMathRow(peopleData,p=>{const ta=peopleData.reduce((s,pp)=>s+pp.adjustedWealth,0);return`${_fsn(p.adjustedWealth)} ÷ ${_fsn(ta)} = ${(total>0?(p.preCapShare/total)*100:0).toFixed(1)}%`;})}</div>,
              <div key="s3"><p className={CLS_FB}>3. AMOUNT OWED:</p>{renderMathRow(peopleData,p=>`${(total>0?(p.preCapShare/total)*100:0).toFixed(1)}% × ${_fc(total,billCurrency)} = ${_fcs(p.preCapShare,billCurrency)}`)}</div>
            ];
            if(capWasApplied) steps.push(<div key="s4"><p className={CLS_FB}>4. CONTRIBUTION CAP ({billFloor.toUpperCase()}X):</p><div className={CLS_JBM}><span>MAX:</span><span className="font-mono">{billFloor} × {_fcs(total/peopleData.length,billCurrency)} = {_fcs(capMax,billCurrency)}</span></div>{renderMathRow(peopleData,p=>{const pre=p.preCapShare;return pre>capMax+0.01?`${_fcs(pre,billCurrency)} → ${_fcs(p.fairShare,billCurrency)} (capped)`:`${_fcs(p.fairShare,billCurrency)}`;})}</div>);
            return renderMathSection(billWeighting,steps,<div><p className={CLS_FB}>EQUAL SPLIT (NO WEIGHTING):</p>{renderMathRow(peopleData,p=>`${_fc(total,billCurrency)} ÷ ${peopleData.length} = ${_fcs(p.fairShare,billCurrency)}`)}</div>);
          }
          const partialDetails=billDetails.filter(d=>d.isPartial);
          const fullDetails=billDetails.filter(d=>!d.isPartial);
          const fullTotal=fullDetails.reduce((s,d)=>s+d.amount,0);
          const taw=peopleData.reduce((s,p)=>s+p.adjustedWealth,0);
          const hasFull=fullDetails.length>0;
          let stepNum=1;
          return <>
            <div className="mb-6">
              <h3 className={CLS_H3}>THE MATH</h3>
              <div className="bg-white p-6 border-2 border-gray-400">
                <div className="space-y-3 text-xs text-black">
                  {billWeighting!=='none'?(<>
                    {renderAdjustedWealthStep(stepNum++,peopleData,billWeighting)}
                    {hasFull&&<><div className={`${CLS_DASHED_T} my-3`}></div>
                    <p className={CLS_FB}>{stepNum++}. SHARED BILLS ({_fc(fullTotal,billCurrency)}):</p>
                    {renderMathRow(peopleData,p=>`${_fsn(p.adjustedWealth)} ÷ ${_fsn(taw)} × ${_fc(fullTotal,billCurrency)} = ${_fcs(taw>0?(p.adjustedWealth/taw)*fullTotal:fullTotal/peopleData.length,billCurrency)}`)}</>}
                    <div className={`${CLS_DASHED_T} my-3`}></div>
                    <p className={CLS_FB}>{stepNum++}. PARTIAL BILLS:</p>
                    {partialDetails.map((d,i)=>(
                      <div key={i} className={i>0?`pt-3 ${CLS_DASHED_T}`:''}>
                        <p className="font-bold uppercase mb-1">{d.desc} ({_fc(d.amount,billCurrency)})</p>
                        {d.shares.map((s,j)=><div key={j} className={CLS_JBM}><span>{s.name}:</span><span className="font-mono">{_fsn(s.aw)} ÷ {_fsn(s.taw)} × {_fc(d.amount,billCurrency)} = {_fcs(s.share,billCurrency)}</span></div>)}
                      </div>
                    ))}
                    <div className={`${CLS_DASHED_T} my-3`}></div>
                    <p className={CLS_FB}>{stepNum++}. TOTAL FAIR SHARES:</p>
                    {renderMathRow(peopleData,p=>`${_fcs(p.preCapShare,billCurrency)} (${(total>0?(p.preCapShare/total)*100:0).toFixed(1)}%)`)}
                    {capWasApplied&&<><div className={`${CLS_DASHED_T} my-3`}></div>
                    <p className={CLS_FB}>{stepNum++}. CONTRIBUTION CAP ({billFloor.toUpperCase()}X):</p>
                    <div className={CLS_JBM}><span>MAX:</span><span className="font-mono">{billFloor} × {_fcs(total/peopleData.length,billCurrency)} = {_fcs(capMax,billCurrency)}</span></div>
                    {renderMathRow(peopleData,p=>{const pre=p.preCapShare;return pre>capMax+0.01?`${_fcs(pre,billCurrency)} → ${_fcs(p.fairShare,billCurrency)} (capped)`:`${_fcs(p.fairShare,billCurrency)}`;})}</>}
                  </>):(<>
                    {hasFull&&<>
                    <p className={CLS_FB}>{stepNum++}. SHARED BILLS ({_fc(fullTotal,billCurrency)}):</p>
                    {renderMathRow(peopleData,p=>`${_fc(fullTotal,billCurrency)} ÷ ${peopleData.length} = ${_fcs(fullTotal/peopleData.length,billCurrency)}`)}
                    <div className={`${CLS_DASHED_T} my-3`}></div></>}
                    <p className={CLS_FB}>{stepNum++}. PARTIAL BILLS:</p>
                    {partialDetails.map((d,i)=>(
                      <div key={i} className={i>0?`pt-3 ${CLS_DASHED_T}`:''}>
                        <p className="font-bold uppercase mb-1">{d.desc} ({_fc(d.amount,billCurrency)})</p>
                        {d.shares.map((s,j)=><div key={j} className={CLS_JBM}><span>{s.name}:</span><span className="font-mono">{_fc(d.amount,billCurrency)} ÷ {d.shares.length} = {_fcs(s.share,billCurrency)}</span></div>)}
                      </div>
                    ))}
                    <div className={`${CLS_DASHED_T} my-3`}></div>
                    <p className={CLS_FB}>{stepNum++}. TOTAL FAIR SHARES:</p>
                    {renderMathRow(peopleData,p=>`${_fcs(p.fairShare,billCurrency)} (${p.fairPct.toFixed(1)}%)`)}
                  </>)}
                </div>
              </div>
            </div>
            <DashedDivider/>
          </>;
        })()}
      </>
    });
  }

  if(page==='sale-entry') return EntryPage({
    steps: SALE_STEPS,
    locked: !toolActivated,
    banner: (
      <div className={`${CLS_DASHED} p-4 bg-gray-50`}>
        <div className="flex gap-3 items-center">
          <svg aria-hidden="true" width="24" height="30" viewBox="0 0 24 30" fill="none" style={{flexShrink:0,marginTop:'0px'}}><path d="M9 9v7.4L4.2 25.5A1 1 0 005 27h14a1 1 0 00.8-1.5L14 16.4V9" stroke={DARK} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M9 9h6" stroke={DARK} strokeWidth="2.5" strokeLinecap="round"/><path d="M8.5 20L5.2 25.2A1 1 0 006 26.5h12a1 1 0 00.8-1.3L15.5 20z" fill={DARK}/><circle cx="8" cy="4.5" r="1.5" fill={DARK}/><circle cx="11.5" cy="2" r="1.3" fill={DARK}/><circle cx="14.5" cy="5" r="1" fill={DARK}/></svg>
          <div>
            <p className="text-xs font-bold uppercase mb-1 text-black">EXPERIMENTAL</p>
            <p className="text-xs text-black leading-relaxed">Equity-based sales might get you a "bad deal" — if all you care about is money.</p>
          </div>
        </div>
      </div>
    ),
    intro: {desc:"Selling a product or service? Comrade assesses would-be buyers' bids while factoring in their wealth to show who really needs it most.",hasSaved:hasSaleSavedData,activated:toolActivated,resumeLabel:"RESUME SALE",newLabel:"NEW SALE",onJump:()=>jump(1),onClear:()=>{setToolActivated(true);jump(1);},onStartOver:()=>handleClearAll('sale'),onExample:()=>{setToolActivated(true);loadExample('sale');}},
    calc: {onCalculate:()=>navigateTo('sale-results'),weighting:saleWeighting,onWeighting:setSaleWeighting,navigateToFaq,hasAdvanced:true,validate:()=>_errs([
      [!productName.trim(),'No product name entered'],
      [saleBuyers.length===0,'No buyers added'],
    ])},
    midSteps:[
      ()=>(
        <div>
          <p className={CLS_STEP_P}>List what you're selling, and how many items are available.</p>
          <FormInput value={productName} onChange={e=>setProductName(e.target.value)} placeholder="PRODUCT NAME" className="mb-2"/>
          <FormInput type="number" value={numberAvailable} onChange={e=>setNumberAvailable(e.target.value)} placeholder="NUMBER AVAILABLE" min="1" step="1" inputMode="numeric"/>
          {contBtn(2)}
        </div>
      ),
      ()=>(
        <div>
          <p className={CLS_STEP_P}>Add all the people interested in buying, along with their financial information.</p>
          <CurrencyWealthSettings currency={saleCurrency} onCurrency={setSaleCurrency} wealth={saleWealthMetric} onWealth={setSaleWealthMetric}/>
          <div className={CLS_ROW}>
            <FormInput value={curBuyerName} onChange={e=>setCurBuyerName(e.target.value)} placeholder="NAME" className="flex-1" style={{minWidth:'120px'}}/>
            <FormInput type="number" value={curBuyerOffer} onChange={e=>setCurBuyerOffer(e.target.value)} placeholder={`${getCurrencySymbol(saleCurrency)} OFFER`} {...NP} className="flex-1" style={{minWidth:'120px'}}/>
          </div>
          <FormInput type="number" value={curBuyerWealth} onChange={e=>setCurBuyerWealth(e.target.value)} placeholder={`${getCurrencySymbol(saleCurrency)} ${getWealthMetricLabel(saleWealthMetric)}`} {...NP} className="mb-3"/>
          <button onClick={()=>{if(curBuyerName.trim()){setSaleBuyers([...saleBuyers,{id:Date.now(),name:curBuyerName,wealth:curBuyerWealth,offer:curBuyerOffer}]);setCurBuyerName('');setCurBuyerWealth('');setCurBuyerOffer('');}}} className={`${CLS_BTN_BLK} mb-4`}>+ ADD BUYER</button>
          {saleBuyers.length>0?<ItemList items={saleBuyers} onDelete={id=>setSaleBuyers(saleBuyers.filter(b=>b.id!==id))} renderItem={b=><><p className={CLS_NAME}>{b.name}</p><p className={CLS_XS}>{getWealthMetricLabel(saleWealthMetric)}: {_fc(b.wealth,saleCurrency)}</p><p className={CLS_XS}>Offer: {_fc(b.offer,saleCurrency)}</p></>}/>:<EmptyState msg="No buyers added yet"/>}
          {contBtn(3)}
        </div>
      ),
    ]
  });

  if(page==='sale-results'){
    const {rankedBuyers,avgOffer}=saleCalculations;
    const numAvail=parseInt(numberAvailable)||1,winners=rankedBuyers.slice(0,numAvail);
    const isTie=rankedBuyers.length>1&&rankedBuyers[0].needScore===rankedBuyers[1].needScore&&rankedBuyers[0].needScore>0;
    const copyText=_ct('Selling results',[`Product: ${productName||'Unnamed'}\nQuantity: ${numAvail}`,`💸 Selected buyer${winners.length>1?'s':''}:\n${winners.map(w=>`${w.name} → ${_fc(w.offer,saleCurrency)}`).join('\n')}`,`📊 All buyers ranked:\n${rankedBuyers.map((b,i)=>`${i+1}. ${b.name} → Offer: ${_fc(b.offer,saleCurrency)} → need score: ${b.needScore.toFixed(4)}%`).join('\n')}`],'the fairer way to handle selling things');
    return ResultsPage({
      entryPage:"sale-entry", title:`SELECTED BUYER${winners.length>1?'S':''}`,
      boxExtra:<BoxBranding tagline="THE FAIRER WAY TO HANDLE SELLING THINGS"/>,
      summary:isTie
        ?<p className="text-lg font-bold">PERFECT TIE. EVERYONE HAS EQUAL CLAIM.</p>
        :<>{winners.map((w,i)=><div key={w.id} className="mb-3 pb-3" style={{borderBottom:`1px dashed ${BG_GREY}`}}><p className="text-3xl font-black mb-2">{w.name.toUpperCase()}</p><p className="text-xl font-semibold">OFFER: {_fc(w.offer,saleCurrency)}</p><p className="text-xs" style={{color:BG_GREY}}>NEED SCORE: {w.needScore<0.01?w.needScore.toExponential(4):w.needScore.toFixed(2)}%</p></div>)}</>,
      stats:[{label:'PRODUCT',value:productName.toUpperCase()||'N/A'},{label:'AVAILABLE',value:numAvail},{label:'AVG OFFER',value:_fc(avgOffer,saleCurrency)}],
      copyText,
      details:<>
        {renderBarVisualization('NEED SCORE VISUALIZATION',rankedBuyers,[{getValue:b=>b.needScore,displayValue:b=>`${b.needScore<0.01?b.needScore.toExponential(2):b.needScore.toFixed(1)}%`,rightLabel:(_,i)=>`#${i+1}`}],b=>b.name)}
        <DashedDivider/>
        {renderDetailCards('BUYER DATA',rankedBuyers,(b,i)=>({name:`#${i+1} ${b.name}`,cardClassName:`p-4 border-2 ${i<numAvail?'border-black bg-gray-100':'border-gray-400 bg-white'}`,titleExtra:<span className={`px-2 py-1 text-xs font-bold border sf ${i<numAvail?'bg-black text-white border-black':'bg-white text-black border-black'}`}>{i<numAvail?'SELECTED':'NOT SELECTED'}</span>,rows:[{label:'WEALTH',value:_fc(b.wealth,saleCurrency)},{label:'OFFER',value:_fc(b.offer,saleCurrency)}],summaryRows:[{label:'NEED SCORE',value:`${b.needScore<0.01?b.needScore.toExponential(4):b.needScore.toFixed(2)}%`}]}))}
        <DashedDivider/>
        {renderMathSection(saleWeighting,[renderAdjustedWealthStep(1,rankedBuyers,saleWeighting),<div key="s2"><p className={CLS_FB}>2. NEED SCORE (OFFER ÷ ADJUSTED WEALTH × 100):</p>{renderMathRow(rankedBuyers,b=>`${_fc(b.offer,saleCurrency)} ÷ ${_fsn(b.adjustedWealth)} × 100 = ${b.needScore<0.01?b.needScore.toExponential(2):b.needScore.toFixed(2)}%`)}</div>],<div><p className={CLS_FB}>NO WEIGHTING - RANKED BY OFFER AMOUNT:</p>{rankedBuyers.map((b,i)=><div key={b.id} className={CLS_JBM}><span>#{i+1} {b.name}:</span><span className="font-mono">{_fc(b.offer,saleCurrency)}</span></div>)}</div>)}
      </>
    });
  }

  if(page==='vote-entry') return EntryPage({
    steps: VOTE_STEPS,
    locked: !toolActivated,

      entryPage:"bet-entry", title:"FAIR STAKES",
      boxExtra:<BoxBranding tagline="THE FAIRER WAY TO MAKE A BET"/>,
      summary:<div className="space-y-3">{betData.map(p=><div key={p.id} className="pb-2" style={{borderBottom:`1px dashed ${BG_GREY}`}}><p className="text-lg font-semibold">{p.name.toUpperCase()} <span style={{opacity:0.5}}>BETS</span></p><p className="text-2xl font-black">{_fcs(p.fairBet,betCurrency)}</p></div>)}<div className="pt-2"><p className="text-lg font-semibold"><span style={{opacity:0.5}}>WINNER TAKES</span></p><p className="text-2xl font-black">{_fcs(pot,betCurrency)}</p></div></div>,
      stats:[{label:'LEAD',value:anchorName.toUpperCase()},{label:'LEAD BET',value:_fc(betAmount,betCurrency)}],
      copyText,
      details:<>
        <div className="mb-6"><h3 className={CLS_H3}>WEALTH VISUALIZATION</h3>{renderWealthPieChart(betData)}</div>
        <DashedDivider/>
        {(()=>{const evenBet=parseFloat(betAmount)||0;return renderBarVisualization('STAKES VISUALIZATION',betData,[{label:'EVEN',color:'#AAAAAA',getValue:()=>evenBet,displayValue:()=>_fcs(evenBet,betCurrency),rightLabel:()=>_fcs(evenBet,betCurrency)},{label:'FAIR',color:DARK,getValue:p=>p.fairBet,displayValue:p=>_fcs(p.fairBet,betCurrency),rightLabel:p=>_fcs(p.fairBet,betCurrency)}],p=>p.name);})()}
        <DashedDivider/>
        {renderDetailCards('BETTOR DATA',betData,p=>({name:p.name,rows:[{label:'WEALTH',value:_fc(p.wealth,betCurrency)}],summaryRows:[{label:'FAIR BET',value:_fcs(p.fairBet,betCurrency)}]}))}
        <DashedDivider/>
        {renderMathSection(betWeighting,[renderAdjustedWealthStep(1,betData,betWeighting),<div key="b2"><p className={CLS_FB}>2. FAIR BET (ADJUSTED WEALTH ÷ LEAD'S ADJUSTED WEALTH × BET):</p>{renderMathRow(betData,p=>`${_fsn(p.adjustedWealth)} ÷ ${_fsn(betData.find(d=>d.name===anchorName)?.adjustedWealth||1)} × ${_fc(betAmount,betCurrency)} = ${_fcs(p.fairBet,betCurrency)}`)}</div>,<div key="b3"><p className={CLS_FB}>3. TOTAL POT:</p><div className={CLS_JBM}><span>WINNER TAKES:</span><span className="font-mono">{_fcs(pot,betCurrency)}</span></div></div>],<div><p className={CLS_FB}>NO WEIGHTING - EVERYONE BETS EQUALLY:</p>{renderMathRow(betData,p=>`${p.name}: ${_fc(betAmount,betCurrency)}`)}<div className={`flex justify-between mt-2 pt-2 ${CLS_DASHED_T} font-bold`}><span>WINNER TAKES:</span><span className="font-mono">{_fcs(betData.length*(parseFloat(betAmount)||0),betCurrency)}</span></div></div>)}
      </>
    });
  }

  return null;
};




// Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Comrade />);
    </script>
</body>
</html>
